# Default topic definitions for FastF1 telemetry streaming.

- name: telemetry.raw
  partitions: 3
  replication_factor: 3
  config:
    cleanup.policy: delete
    retention.ms: 604800000
    min.insync.replicas: 2

- name: race.events
  partitions: 3
  replication_factor: 3
  config:
    cleanup.policy: delete
    retention.ms: 604800000
    min.insync.replicas: 2 

- name: dlq.neo4j
  partitions: 3
  replication_factor: 3
  config:
    cleanup.policy: delete
    retention.ms: 259200000
    min.insync.replicas: 2

