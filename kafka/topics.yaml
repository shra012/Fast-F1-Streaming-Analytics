# Default topic definitions for FastF1 telemetry streaming.

- name: telemetry.raw
  partitions: 3
  replication_factor: 3
  config:
    cleanup.policy: delete
    retention.ms: 604800000
    min.insync.replicas: 2

- name: race.events
  partitions: 3
  replication_factor: 3
  config:
    cleanup.policy: delete
    retention.ms: 604800000
    min.insync.replicas: 2 

# Graph-focused topics consumed by MSK Connect / Neo4j sink.
- name: graph.neo4j.driver_nodes
  partitions: 3
  replication_factor: 3
  config:
    cleanup.policy: compact
    min.cleanable.dirty.ratio: 0.1
    delete.retention.ms: 86400000

